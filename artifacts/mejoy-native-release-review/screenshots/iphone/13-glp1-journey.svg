<circle cx="720" cy="1820" r="180" fill="rgba(240,160,75,0.10)" />
<rect x="180" y="34" width="500" height="2250" rx="52" fill="#141A1B" />
<rect x="198" y="52" width="464" height="2214" rx="38" fill="#F6F5F0" />
<rect x="350" y="74" width="160" height="36" rx="18" fill="#0F1012" />
