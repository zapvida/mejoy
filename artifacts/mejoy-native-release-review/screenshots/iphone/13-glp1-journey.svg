<circle cx="582" cy="166" r="64" fill="rgba(240,160,75,0.12)" />
<circle cx="278" cy="418" r="56" fill="rgba(221,239,231,0.08)" />

    <text x="240" y="152" fill="#CFE8DC" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">
      <tspan x="240" dy="0">JORNADA GLP-1</tspan>
    </text>
  

    <text x="240" y="198" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="0">
      <tspan x="240" dy="0">Dose, fase,</tspan><tspan x="240" dy="42">aplicação e</tspan><tspan x="240" dy="42">segurança no</tspan><tspan x="240" dy="42">mesmo lugar</tspan>
    </text>
  

    <text x="240" y="278" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="16" font-weight="500" letter-spacing="0">
      <tspan x="240" dy="0">A jornada não tenta adivinhar dose. Ela</tspan><tspan x="240" dy="24">organiza o cuidado e deixa o ajuste</tspan><tspan x="240" dy="24">para validação médica.</tspan>
    </text>
  

    <g>
      <rect x="482" y="152" width="156.8" height="34" rx="17" fill="#DDF5E7" />
      <text x="496" y="174" fill="#106F4A" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="13" font-weight="700">fase de evolução</text>
    </g>
  

    <g>
      <rect x="232" y="328" width="140" height="110" rx="22" fill="#1A4E3D" stroke="rgba(255,255,255,0.08)" />
      
    <text x="248" y="352" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">
      <tspan x="248" dy="0">DOSE</tspan>
    </text>
  
      
    <text x="248" y="382" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0">
      <tspan x="248" dy="0">7,5 mg</tspan>
    </text>
  
      
    <text x="248" y="410" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" font-weight="500" letter-spacing="0">
      <tspan x="248" dy="0">prescrita</tspan>
    </text>
  
    </g>
  

    <g>
      <rect x="380" y="328" width="140" height="110" rx="22" fill="#4E351E" stroke="rgba(255,255,255,0.08)" />
      
    <text x="396" y="352" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">
      <tspan x="396" dy="0">PRÓXIMA</tspan><tspan x="396" dy="15.399999999999999">APLICAÇÃO</tspan>
    </text>
  
      
    <text x="396" y="382" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0">
      <tspan x="396" dy="0">2 dias</tspan>
    </text>
  
      
    <text x="396" y="410" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" font-weight="500" letter-spacing="0">
      <tspan x="396" dy="0">lembrete ativo</tspan>
    </text>
  
    </g>
  

    <g>
      <rect x="528" y="328" width="140" height="110" rx="22" fill="#1A4E3D" stroke="rgba(255,255,255,0.08)" />
      
    <text x="544" y="352" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">
      <tspan x="544" dy="0">PESO PERDIDO</tspan>
    </text>
  
      
    <text x="544" y="382" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0">
      <tspan x="544" dy="0">4,8 kg</tspan>
    </text>
  
      
    <text x="544" y="410" fill="#D7E7DF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" font-weight="500" letter-spacing="0">
      <tspan x="544" dy="0">desde o início</tspan>
    </text>
  
    </g>
  
<rect x="216" y="456" width="428" height="509" rx="26" fill="#FFFFFF" stroke="#E4E8E5" />

    <text x="238" y="486" fill="#15875F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">
      <tspan x="238" dy="0">SEGURANÇA</tspan>
    </text>
  

    <text x="238" y="526" fill="#0C1A16" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="30" font-weight="700" letter-spacing="0">
      <tspan x="238" dy="0">O que sempre aparece com</tspan><tspan x="238" dy="32">clareza</tspan>
    </text>
  

      <g>
        <rect x="228" y="568" width="412" height="114" rx="20" fill="#F7F6F2" />
        <circle cx="246" cy="590" r="5" fill="#15875F" />
        
    <text x="262" y="592" fill="#0C1A16" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0">
      <tspan x="262" dy="0">Rotação do local de aplicação</tspan>
    </text>
  
        
        
    <text x="262" y="620" fill="#6F847D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="0">
      <tspan x="262" dy="0">O app lembra para evitar repetição no mesmo</tspan><tspan x="262" dy="20">ponto.</tspan>
    </text>
  
      </g>
    

      <g>
        <rect x="228" y="694" width="412" height="109" rx="20" fill="#F7F6F2" />
        <circle cx="246" cy="716" r="5" fill="#F0A04B" />
        
    <text x="262" y="718" fill="#0C1A16" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0">
      <tspan x="262" dy="0">Ajuste de dose pede validação</tspan><tspan x="262" dy="22">médica</tspan>
    </text>
  
        
        
    <text x="262" y="768" fill="#6F847D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="0">
      <tspan x="262" dy="0">A IA apoia, mas não sobe ou desce dose sozinha.</tspan>
    </text>
  
      </g>
    

      <g>
        <rect x="228" y="815" width="412" height="126" rx="20" fill="#F7F6F2" />
        <circle cx="246" cy="837" r="5" fill="#157347" />
        
    <text x="262" y="839" fill="#0C1A16" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0">
      <tspan x="262" dy="0">Náusea, constipação e hidratação</tspan><tspan x="262" dy="22">entram cedo</tspan>
    </text>
  
        
        
    <text x="262" y="889" fill="#6F847D" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="0">
      <tspan x="262" dy="0">O paciente entende o que monitorar antes de</tspan><tspan x="262" dy="20">piorar.</tspan>
    </text>
  
      </g>
    

    <text x="246" y="993" fill="#537067" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" font-weight="500" letter-spacing="0">
      <tspan x="246" dy="0">/glp1-journey · happy · 1m</tspan>
    </text>
  
