<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-fembalance-360" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottle-fembalance-360" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-fembalance-360">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg-fembalance-360)"/>
  
  <!-- Shadow -->
  <ellipse cx="512" cy="900" rx="280" ry="40" fill="#d0d0d0" opacity="0.4"/>
  
  <!-- Bottle Container -->
  <g transform="translate(512, 500)" filter="url(#shadow-fembalance-360)">
    <!-- Bottle body -->
    <rect x="-130" y="-280" width="260" height="420" rx="25" fill="url(#bottle-fembalance-360)" stroke="#d0d0d0" stroke-width="2"/>
    
    <!-- Bottle cap -->
    <rect x="-90" y="-330" width="180" height="50" rx="10" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
    <rect x="-85" y="-325" width="170" height="5" rx="2" fill="#4a5568"/>
    
    <!-- Label area with rounded corners -->
    <rect x="-110" y="-200" width="220" height="280" rx="15" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- ZapFarm logo area -->
    <text x="0" y="-160" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ec4899" text-anchor="middle" letter-spacing="1">ZapFarm</text>
    
    <!-- Product name -->
    <text x="0" y="-100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a202c" text-anchor="middle" letter-spacing="-1">FemBalance 360</text>
    
    <!-- Subtitle lines -->
    <text x="0" y="-50" font-family="Arial, sans-serif" font-size="16" fill="#4a5568" text-anchor="middle">Menopausa</text>
    <text x="0" y="-28" font-family="Arial, sans-serif" font-size="16" fill="#4a5568" text-anchor="middle">TPM 360</text>
    
    <!-- Accent decorative line -->
    <line x1="-95" y1="-10" x2="95" y2="-10" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <line x1="-95" y1="0" x2="95" y2="0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Bottom info -->
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="13" fill="#718096" text-anchor="middle" font-weight="600">30 dias de uso</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">Uso sob orientação profissional</text>
    
    <!-- Small decorative element -->
    <circle cx="-80" cy="20" r="3" fill="#ec4899" opacity="0.5"/>
    <circle cx="80" cy="20" r="3" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>