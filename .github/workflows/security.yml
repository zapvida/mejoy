name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/security/scan-secrets.mjs

